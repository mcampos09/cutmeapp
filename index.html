<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cut Me App</title>
<!-- reCAPTCHA v3 — invisible, score-based -->
<script src="https://www.google.com/recaptcha/api.js?render=TU_SITE_KEY_V3" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --purple:#7B5EA7;--purple-light:#EDE9F6;--purple-dark:#4A3570;
  --pink:#D4547A;--pink-light:#FAEEF3;
  --teal:#2A9D8F;--teal-light:#E0F5F3;
  --amber:#E9A84C;--amber-light:#FDF3E3;
  --red:#E05252;--red-light:#FDECEC;
  --green:#3B9E6A;--green-light:#E5F5ED;
  --blue:#3B7DD8;--blue-light:#E8F0FC;
  --bg:#F6F4FB;--surface:#FFFFFF;
  --border:rgba(123,94,167,0.12);--border2:rgba(123,94,167,0.22);
  --text:#1A1228;--text-2:#6B5F82;--text-3:#9E94B0;
  --r:14px;--rs:8px;
  --sh:0 2px 16px rgba(123,94,167,0.08);
  --shlg:0 8px 32px rgba(123,94,167,0.14);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── TOPBAR ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:58px;position:sticky;top:0;z-index:50;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:16px;}
.logo-txt{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--text);}
.logo-txt span{color:var(--purple);}
.hbg{width:38px;height:38px;border:1px solid var(--border);background:var(--surface);border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
.hbg span{display:block;width:15px;height:1.5px;background:var(--text-2);border-radius:2px;}
.upill{display:flex;align-items:center;gap:8px;padding:5px 12px 5px 5px;border:1px solid var(--border);border-radius:24px;cursor:pointer;background:var(--surface);}
.ava{width:28px;height:28px;border-radius:50%;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--purple);font-family:'Syne',sans-serif;}
.lbtn{padding:7px 18px;border-radius:24px;border:1px solid var(--purple);background:transparent;font-size:13px;font-weight:500;color:var(--purple);cursor:pointer;font-family:'DM Sans',sans-serif;}

/* ── DRAWER ── */
.ov{position:fixed;inset:0;background:rgba(26,18,40,0.4);z-index:100;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.ov.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;top:0;left:0;bottom:0;width:300px;background:var(--surface);z-index:101;transform:translateX(-100%);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;box-shadow:4px 0 40px rgba(123,94,167,0.15);}
.drawer.open{transform:translateX(0);}
.dh{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.dclose{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:none;cursor:pointer;font-size:16px;color:var(--text-3);display:flex;align-items:center;justify-content:center;}
.db{flex:1;overflow-y:auto;padding:12px 0;}
.ucard{margin:0 14px 8px;padding:12px 14px;background:var(--purple-light);border-radius:var(--rs);display:flex;align-items:center;gap:10px;}
.ucardava{width:40px;height:40px;border-radius:50%;background:var(--purple);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:white;font-family:'Syne',sans-serif;flex-shrink:0;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:14px;color:var(--text-2);border-left:2px solid transparent;transition:all 0.15s;}
.ni:hover{background:var(--purple-light);color:var(--purple);}
.ni.act{background:var(--purple-light);color:var(--purple);border-left-color:var(--purple);font-weight:500;}
.ni.danger:hover{background:var(--red-light);color:var(--red);border-left-color:var(--red);}
.nsep{height:1px;background:var(--border);margin:8px 20px;}
.ngrp{padding:4px 20px 2px;font-size:10px;font-weight:600;color:var(--text-3);letter-spacing:0.08em;text-transform:uppercase;}

/* ── AUTH FORMS ── */
.dtabs{display:flex;border-bottom:1px solid var(--border);margin:0 20px 16px;}
.dtab{flex:1;padding:10px 8px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;text-align:center;color:var(--text-3);transition:all 0.2s;margin-bottom:-1px;}
.dtab.act{color:var(--purple);border-bottom-color:var(--purple);font-weight:500;}
.fi{padding:0 20px;}
.f{margin-bottom:12px;}
.lb{font-size:12px;color:var(--text-2);margin-bottom:5px;display:block;font-weight:500;}
.inp{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--rs);font-size:13px;color:var(--text);background:var(--surface);font-family:'DM Sans',sans-serif;transition:border-color 0.2s;}
.inp:focus{outline:none;border-color:var(--purple);}
.inp-sel{appearance:none;}
.topt{flex:1;padding:9px 6px;border:1px solid var(--border);border-radius:var(--rs);text-align:center;cursor:pointer;font-size:12px;color:var(--text-2);background:var(--surface);}
.topt.act{border-color:var(--purple);background:var(--purple-light);color:var(--purple);font-weight:500;}
.errmsg{font-size:12px;color:var(--red);margin-top:6px;}
.hintbox{background:var(--purple-light);border-radius:var(--rs);padding:10px 12px;font-size:11px;color:var(--text-2);margin-top:12px;line-height:1.7;}

/* ── BUTTONS ── */
.btn{width:100%;padding:11px;border-radius:var(--rs);border:none;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-p{background:linear-gradient(135deg,var(--purple),var(--pink));color:white;}
.btn-o{background:transparent;color:var(--purple);border:1px solid var(--purple)!important;border-radius:var(--rs)!important;}
.btn-g{background:linear-gradient(135deg,var(--teal),#1A7A6E);color:white;}
.btn-r{background:var(--red-light);color:var(--red);}
.bsm{padding:5px 10px;border-radius:6px;border:none;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.bsm-p{background:var(--purple-light);color:var(--purple);}
.bsm-r{background:var(--red-light);color:var(--red);}
.bsm-g{background:var(--green-light);color:var(--green);}
.bsm-a{background:var(--amber-light);color:#92400E;}
.bsm-b{background:var(--blue-light);color:var(--blue);}

/* ── LAYOUT ── */
.main{max-width:900px;margin:0 auto;padding:24px 20px;}
.ph{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.pbk{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:16px;color:var(--text-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ptit{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--sh);}
.ctit{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;margin-bottom:14px;color:var(--text);}
.stit{font-family:'Syne',sans-serif;font-size:16px;font-weight:600;color:var(--text);margin-bottom:14px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.badge{display:inline-block;padding:2px 9px;border-radius:12px;font-size:10px;font-weight:600;font-family:'Syne',sans-serif;}
.bp{background:#FEF3C7;color:#92400E;}
.bc{background:#D1FAE5;color:#065F46;}
.br{background:#FEE2E2;color:#991B1B;}
.bb{background:var(--blue-light);color:var(--blue);}
.callout{border-radius:10px;padding:12px 14px;font-size:12px;margin-bottom:12px;display:flex;gap:8px;align-items:flex-start;line-height:1.5;}
.ca{background:var(--amber-light);color:#92400E;}
.ct{background:var(--teal-light);color:var(--teal);}
.cb{background:var(--blue-light);color:var(--blue);}

/* ── HOME ── */
.hero{background:linear-gradient(135deg,var(--purple-dark) 0%,var(--purple) 55%,var(--pink) 100%);border-radius:20px;padding:32px 28px;margin-bottom:28px;color:white;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.06);}
.heb{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.7;margin-bottom:8px;}
.het{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;margin-bottom:8px;line-height:1.2;}
.hed{font-size:14px;opacity:0.8;margin-bottom:20px;max-width:380px;line-height:1.6;}
.hecta{display:flex;gap:10px;flex-wrap:wrap;}
.hbw{padding:10px 20px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;background:white;color:var(--purple);font-family:'Syne',sans-serif;}
.hbt{padding:10px 20px;border-radius:10px;border:1px solid rgba(255,255,255,0.4);font-size:13px;cursor:pointer;background:rgba(255,255,255,0.15);color:white;}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;min-width:120px;text-align:center;}
.chip:hover{border-color:var(--purple);}
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.catpill{padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-2);}
.catpill.act{background:var(--purple);color:white;border-color:var(--purple);}
.svclist{display:flex;flex-direction:column;gap:8px;}
.svcrow{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;}
.svcrow:hover{border-color:var(--purple);}
.svcicn{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.svccta{padding:7px 14px;border-radius:8px;border:none;background:var(--purple-light);color:var(--purple);font-size:12px;font-weight:500;cursor:pointer;flex-shrink:0;}
.svccta:hover{background:var(--purple);color:white;}

/* ── BOOKING STEPS ── */
.steps{display:flex;align-items:center;margin-bottom:24px;}
.sdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;font-family:'Syne',sans-serif;flex-shrink:0;}
.sdot.done{background:var(--purple);color:white;}
.sdot.act{background:var(--purple);color:white;box-shadow:0 0 0 4px var(--purple-light);}
.sdot.pend{background:var(--bg);color:var(--text-3);border:1.5px solid var(--border);}
.slbl{font-size:11px;color:var(--text-3);}
.slbl.act{color:var(--purple);font-weight:500;}
.sline{flex:1;height:1.5px;background:var(--border);margin:0 6px;}
.sline.done{background:var(--purple);}

/* ── PRO CARDS ── */
.prolist{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.procard{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;}
.procard:hover{border-color:var(--purple);}
.procard.sel{border-color:var(--purple);background:var(--purple-light);box-shadow:0 0 0 3px rgba(123,94,167,0.1);}
.proava{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;font-family:'Syne',sans-serif;color:white;flex-shrink:0;}
.protag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;}
.ptE{background:var(--teal-light);color:var(--teal);}
.ptD{background:var(--amber-light);color:#92400E;}
.selbadge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;background:var(--purple);color:white;border-radius:10px;font-size:9px;font-weight:700;font-family:'Syne',sans-serif;margin-left:6px;vertical-align:middle;}

/* ── MODALIDAD ── */
.modrow{display:flex;gap:10px;margin-bottom:14px;}
.modopt{flex:1;border:1.5px solid var(--border);border-radius:var(--r);padding:16px 12px;text-align:center;cursor:pointer;background:var(--surface);position:relative;}
.modopt:hover{border-color:var(--purple);}
.modopt.act{border-color:var(--purple);background:var(--purple-light);}
.modopt.dis{opacity:0.4;cursor:not-allowed;pointer-events:none;}
.modbadge{position:absolute;top:-8px;right:8px;color:white;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px;font-family:'Syne',sans-serif;}
.gopt{flex:1;border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;cursor:pointer;background:var(--surface);}
.gopt:hover{border-color:var(--purple);}
.gopt.act{border-color:var(--purple);background:var(--purple-light);}
.totalbar{background:var(--purple-light);border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}

/* ── APT ITEMS ── */
.aptitem{border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.aptitem.pending{border-left:3px solid var(--amber);background:#FFFBF0;}
.aptitem.confirmed{border-left:3px solid var(--teal);background:#F0FBF8;}
.aptitem.rejected{border-left:3px solid var(--red);background:#FFF5F5;}
.aptitem.done{border-left:3px solid var(--text-3);background:var(--bg);}
.aptitem.own{border-left:3px solid var(--blue);background:var(--blue-light);}
.statbox{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.statnum{font-size:22px;font-weight:700;font-family:'Syne',sans-serif;}
.statlbl{font-size:11px;color:var(--text-3);margin-top:3px;}

/* ── WALLET ── */
.wallet{background:linear-gradient(135deg,var(--teal),#1A7A6E);border-radius:var(--r);padding:20px;margin-bottom:14px;color:white;}
.wamt{font-family:'Syne',sans-serif;font-size:32px;font-weight:700;margin-bottom:12px;}
.wstat{flex:1;background:rgba(255,255,255,0.15);border-radius:8px;padding:10px;}
.wstatn{font-size:18px;font-weight:700;font-family:'Syne',sans-serif;}
.wstatl{font-size:10px;opacity:0.75;margin-top:2px;}
.wbtn{background:white;color:var(--teal);border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}

/* ── FEATURED / ADMIN ── */
.featured-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:linear-gradient(135deg,#F59E0B,#F97316);color:white;font-family:'Syne',sans-serif;}
.featured-ring{border:2px solid #F59E0B!important;box-shadow:0 0 0 3px rgba(245,158,11,0.15);}
.featured-banner{background:linear-gradient(135deg,#FEF3C7,#FDE68A);border:1px solid #F59E0B;border-radius:10px;padding:8px 12px;font-size:11px;color:#92400E;font-weight:500;display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.admin-stat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;}
.admin-stat-n{font-size:26px;font-weight:700;font-family:'Syne',sans-serif;}
.admin-stat-l{font-size:11px;color:var(--text-3);margin-top:3px;}
/* ── REVIEWS / STARS ── */
.star-picker{display:flex;gap:4px;margin-bottom:12px;}
.star-picker span{font-size:28px;cursor:pointer;transition:transform 0.1s;color:#D1D5DB;line-height:1;}
.star-picker span.on{color:#F59E0B;}
.star-picker span:hover{transform:scale(1.15);}
.review-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;}
.review-stars{color:#F59E0B;font-size:14px;letter-spacing:1px;}
.review-pending{opacity:0.6;border-style:dashed;}
.rating-bar{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.rating-bar-fill{height:6px;border-radius:3px;background:linear-gradient(90deg,#F59E0B,#F97316);transition:width 0.3s;}
.rating-bar-bg{flex:1;height:6px;border-radius:3px;background:var(--bg);}
/* ── SCHEDULE ── */
.daygrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:16px;}
.daycol{border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.dayhd{padding:8px 6px;text-align:center;font-size:11px;font-weight:600;font-family:'Syne',sans-serif;}
.dayhd.open{background:var(--purple-light);color:var(--purple);}
.dayhd.closed{background:var(--bg);color:var(--text-3);}
.timeslot{padding:5px 4px;text-align:center;font-size:10px;cursor:pointer;transition:all 0.1s;border-top:1px solid var(--border);}
.timeslot.on{background:var(--purple-light);color:var(--purple);font-weight:500;}
.timeslot.off{color:var(--text-3);background:var(--surface);}
.timeslot.blocked{background:var(--red-light);color:var(--red);}

/* ── SERVICE MGMT ── */
.svcmgmt{display:flex;flex-direction:column;gap:8px;}
.svcmgmtrow{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.svcmgmticn{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}

/* ── CALENDAR WEEK VIEW ── */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.week-days{display:grid;grid-template-columns:60px repeat(7,1fr);gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.wdh{padding:8px 4px;text-align:center;font-size:11px;font-weight:600;background:var(--purple-light);color:var(--purple);border-bottom:1px solid var(--border);}
.wdh.time{background:var(--bg);color:var(--text-3);}
.wdh.today{background:var(--purple);color:white;}
.whour{padding:6px 4px;font-size:10px;color:var(--text-3);text-align:right;padding-right:8px;border-top:1px solid var(--border);background:var(--bg);}
.wcell{border-top:1px solid var(--border);border-left:1px solid var(--border);padding:2px;min-height:30px;cursor:pointer;transition:background 0.1s;}
.wcell:hover{background:var(--purple-light);}
.wcell.has-apt{background:var(--teal-light);}
.wcell.blocked{background:var(--red-light);}
.wcell.own-apt{background:var(--blue-light);}
.apt-block{font-size:9px;font-weight:500;padding:2px 4px;border-radius:4px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.apt-block.client{background:var(--teal);color:white;}
.apt-block.own{background:var(--blue);color:white;}
.apt-block.block{background:var(--red);color:white;}

/* ── CONFIRM ── */
.confirmwrap{display:flex;align-items:center;justify-content:center;min-height:50vh;}
.confirmbox{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 32px;text-align:center;max-width:360px;box-shadow:var(--shlg);}
.empty{text-align:center;padding:40px 20px;color:var(--text-3);font-size:14px;}
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{background:var(--purple-light);color:var(--purple);font-weight:600;padding:10px 14px;text-align:left;font-family:'Syne',sans-serif;font-size:12px;}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text);}
.tbl tr:last-child td{border-bottom:none;}
.tbl tfoot td{background:var(--purple-light);font-weight:600;color:var(--purple);font-family:'Syne',sans-serif;}
.tblwrap{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px;}
.toggle2{display:flex;gap:8px;margin-bottom:10px;}
.tgbtn{flex:1;padding:9px 8px;border:1px solid var(--border);border-radius:8px;text-align:center;cursor:pointer;font-size:12px;}
.tgon-t{border-color:var(--teal)!important;background:var(--teal-light);color:var(--teal);font-weight:500;}
.tgon-a{border-color:var(--amber)!important;background:var(--amber-light);color:#92400E;font-weight:500;}
.tgoff{border-color:var(--red)!important;background:var(--red-light);color:var(--red);}

/* ── TOAST NOTIFICATIONS ── */

function slotsFor(pro,date){
  if(!pro||!date)return[];
  const d=new Date(date+'T00:00:00');
  const dow=((d.getDay()+6)%7); // 0=Mon
  const dayData=pro.schedule[dow];
  if(!dayData||!dayData.on)return[];
  const booked=S.appointments.filter(a=>a.date===date&&a.pro?.id===pro.id&&a.status!=='rejected').map(a=>a.time);
  const blocked=(pro.blocks||[]).filter(b=>b.date===date).flatMap(b=>{
    const hrs=[];ALLHRS.forEach(h=>{if(h>=b.from&&h<b.to)hrs.push(h);});return hrs;
  });
  return dayData.hrs.filter(h=>!booked.includes(h)&&!blocked.includes(h));
}

// ── CAPTCHA HELPERS (reCAPTCHA v3 invisible) ─────────────────────────────────
// Replace 'TU_SITE_KEY_V3' with your actual reCAPTCHA v3 site key.
// Token is sent to your backend for server-side verification.
// Minimum score threshold: 0.5 (0.0 = bot, 1.0 = human)
const RECAPTCHA_V3_KEY = 'TU_SITE_KEY_V3';
const SCORE_THRESHOLD  = 0.5;
let _loginFailCount    = 0; // track failed logins — captcha activates after 3 fails

function getV3Token(action){
  return new Promise((resolve,reject)=>{
    if(typeof grecaptcha==='undefined'){
      // reCAPTCHA not loaded (dev/offline) — resolve with null to allow flow
      console.warn('[reCAPTCHA] Script not loaded. Skipping verification.');
      return resolve(null);
    }
    grecaptcha.ready(()=>{
      grecaptcha.execute(RECAPTCHA_V3_KEY,{action})
        .then(resolve).catch(reject);
    });
  });
}

// Simulates backend verification — replace with real fetch() to your API

  if(!token) return true; // dev mode: skip
  // In production:

  // const data = await res.json();
  // return data.success && data.score >= SCORE_THRESHOLD;
  console.log(`[reCAPTCHA] Token for action "${action}":`, token.slice(0,20)+'…');
  return true; // demo: always passes
}

// ── AUTH ─────────────────────────────────────────────────────────────────────
async function doLogin(){
  const e=document.getElementById('li-e')?.value.trim()||'';
  const p=document.getElementById('li-p')?.value||'';
  hideCaptchaError();

  // reCAPTCHA v3: only challenge after 3 failed attempts
  if(_loginFailCount >= 3){
    try{
      const token = await getV3Token('login');
      const ok    = await verifyV3Token(token,'login');
      if(!ok){
        showCaptchaError('Verificación fallida. Intenta de nuevo.');
        return;
      }
    } catch(err){
      console.error('[reCAPTCHA] Error:',err);
    }
  }

  const u=S.users.find(x=>x.email===e&&x.password===p);
  if(u){
    _loginFailCount=0;
    S.user=u;S.drawerOpen=false;S.lf.error='';render();
  } else {
    _loginFailCount++;
    S.lf.error=`Email o contraseña incorrectos${_loginFailCount>=3?' (verificación activada)':''}`;
    render();
  }
}

async function submitPay(){
  const pn=document.getElementById('p-n')?.value||'';
  const pnm=document.getElementById('p-nm')?.value||'';
  const pe=document.getElementById('p-e')?.value||'';
  const pc=document.getElementById('p-c')?.value||'';
  if(!pn||!pnm||!pe||!pc){showToast('Completa los datos de pago','warn');return;}
  // FIX 8: basic card validation
  const cleanPn=pn.replace(/\s/g,'');
  if(!/^\d{16}$/.test(cleanPn)){showToast('Número de tarjeta inválido','err');return;}
  if(!/^\d{2}\/\d{2}$/.test(pe)){showToast('Fecha de vencimiento inválida','err');return;}
  const [mm,yy]=pe.split('/').map(Number);
  const now=new Date(); const expiry=new Date(2000+yy,mm-1,1);
  if(mm<1||mm>12||expiry<now){showToast('La tarjeta está vencida','err');return;}
  if(!/^\d{3,4}$/.test(pc)){showToast('CVV inválido','err');return;}
  // FIX 1: reCAPTCHA v3 on payment (anti-carding)
  try{
    const token=await getV3Token('payment');
    const ok=await verifyV3Token(token,'payment');
    if(!ok){showToast('Verificación de seguridad fallida. Intenta de nuevo.','err');return;}
  }catch(err){console.error('[reCAPTCHA]',err);}
  const t=calcTotal(gp(S.selSvc,S.form.gender),S.selPro,S.selMod);
  const bookedByProId=S._bookingAsPro&&S.user?.type==='professional'?myPro()?.id:null;
  S.appointments.push({...S.form,id:uid(),service:S.selSvc,pro:S.selPro,modality:S.selMod,address:S.clientAddr,price:t,status:'pending',isOwn:false,bookedByProId});
  S._bookingAsPro=false;
  S.selSvc=null;S.selPro=null;S.selMod=null;go('confirm');
}

  if(!ob.proSvcId||!ob.date||!ob.time||!ob.clientName||!ob.gender){showToast('Completa todos los campos requeridos','warn');return;}
  const pro=myPro();
  // FIX 4: verify slot is still available before confirming
  const available=slotsFor(pro,ob.date);
  if(!available.includes(ob.time)){showToast('Ese horario ya no está disponible. Elige otro.','err');render();return;}
  const svc=ALL_SVCS.find(s=>s.id===ob.proSvcId);
  const price=gp(svc,ob.gender);
  S.appointments.push({
    id:uid(),name:ob.clientName,phone:ob.clientPhone,email:'',date:ob.date,time:ob.time,
    gender:ob.gender,notes:ob.notes,service:svc,pro,modality:'estudio',address:pro.modalities.estudio.address||'',
    price,status:'confirmed',isOwn:true
  });
  S.ownBooking={proSvcId:'',date:'',time:'',clientName:'',clientPhone:'',gender:'',notes:''};
  S.proTab='citas';render();
  showToast('Cita agendada exitosamente','ok');
}

// ── PRO SERVICE MANAGEMENT ────────────────────────────────────────────────────
function addProSvc(){
  const ns=S.newSvc;
  ns.name=document.getElementById('ns-name')?.value||ns.name;
  ns.dur=document.getElementById('ns-dur')?.value||ns.dur;
  ns.pM=parseFloat(document.getElementById('ns-pm')?.value)||ns.pM;
  ns.pF=parseFloat(document.getElementById('ns-pf')?.value)||ns.pF;
  ns.cat=document.getElementById('ns-cat')?.value||ns.cat;
  if(!ns.name||!ns.dur||!ns.pM||!ns.pF||!ns.cat){showToast('Completa todos los campos','warn');return;}
  const pro=myPro();
  const newId=uid();
  const newSvcObj={id:newId,name:ns.name,dur:ns.dur,pM:parseFloat(ns.pM),pF:parseFloat(ns.pF),icon:ns.icon,cat:ns.cat,bg:'#EDE9F6'};
  // FIX 13: add to state.proServices, not global ALL_SVCS
  if(!S.proServices[pro.id]) S.proServices[pro.id]=[];
  S.proServices[pro.id].push(newSvcObj);
  pro.svcIds.push(newId);
  S.newSvc={name:'',dur:'',pM:'',pF:'',cat:'',icon:'✂️'};
  render();showToast('Servicio agregado','ok');
}
function removeProSvc(id){
  if(!confirm('¿Eliminar este servicio?'))return;
  const pro=myPro();
  pro.svcIds=pro.svcIds.filter(x=>x!==id);
  render();
}

// ── AGENDA / SCHEDULE ─────────────────────────────────────────────────────────
function toggleHour(dow,hr){
  const pro=myPro(); // FIX 12
  const d=pro.schedule[dow];
  if(d.hrs.includes(hr))d.hrs=d.hrs.filter(h=>h!==hr);
  else d.hrs=[...d.hrs,hr].sort();
  render();
}
function toggleDay(dow){
  const pro=myPro();
  pro.schedule[dow].on=!pro.schedule[dow].on;
  render();
}
function addBlock(){
  const bf=S.blockForm;
  bf.date=document.getElementById('bl-d')?.value||bf.date;
  bf.from=document.getElementById('bl-f')?.value||bf.from;
  bf.to=document.getElementById('bl-t')?.value||bf.to;
  bf.reason=document.getElementById('bl-r')?.value||bf.reason;
  if(!bf.date||!bf.from||!bf.to){showToast('Completa fecha y horario','warn');return;}
  myPro().blocks.push({id:uid(),...bf});
  S.blockForm={date:'',from:'',to:'',reason:''};
  render();
}
function removeBlock(id){
  const pro=myPro(); // FIX 12: cache, don't call twice
  pro.blocks=(pro.blocks||[]).filter(b=>b.id!==id);
  render();
}

      </div>`:''}
      <div style="display:flex;gap:8px;">
        <button class="btn btn-o" style="flex:0 0 44px;" onclick="goBStep(2)">←</button>
        <button class="btn btn-p" onclick="S.form.time=document.getElementById('f-t')?.value||'';bNext()">${S.editingId?'Guardar cambios':'Continuar al pago'}</button>
      </div>
    </div>`;
  }else if(step===4){
    const base=gp(s,S.form.gender),tot=calcTotal(base,S.selPro,S.selMod);
    content=`<div class="card">
      <div class="ctit">Pago seguro 🔒</div>
      <div style="background:var(--purple-light);border-radius:10px;padding:14px;margin-bottom:16px;">
        ${[['Servicio',s.name],['Profesional',S.selPro.name],['Modalidad',S.selMod==='domicilio'?'🚗 A domicilio':'🏢 En estudio'],
          ...(S.selMod==='domicilio'?[['Dirección',S.clientAddr]]:[['Estudio',S.selPro.modalities.estudio.address]]),
          ['Fecha',`${S.form.date} ${S.form.time}`],['Servicio base',fp(base)],
          ...(S.selMod==='domicilio'?[['Traslado',`<span style="color:var(--amber)">+${fp(S.selPro.modalities.domicilio.surcharge)}</span>`]]:[])
        ].map(([k,v])=>`<div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px;"><span style="color:var(--text-2);">${k}</span><span>${v}</span></div>`).join('')}
        <div style="display:flex;justify-content:space-between;padding-top:10px;border-top:1px solid rgba(123,94,167,0.15);font-weight:700;font-size:16px;color:var(--purple);">
          <span>Total</span><span>${fp(tot)}</span></div>
      </div>
      <div class="f"><label class="lb">Número de tarjeta</label><input class="inp" id="p-n" placeholder="1234 5678 9012 3456" oninput="this.value=fc(this.value)"></div>
      <div class="f"><label class="lb">Nombre en la tarjeta</label><input class="inp" id="p-nm" placeholder="JUAN PEREZ"></div>
      <div class="g2">
        <div class="f"><label class="lb">Vencimiento</label><input class="inp" id="p-e" placeholder="MM/AA" oninput="this.value=fe(this.value)"></div>
        <div class="f"><label class="lb">CVV</label><input class="inp" id="p-c" placeholder="123" maxlength="3"></div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-o" style="flex:0 0 44px;" onclick="goBStep(3)">←</button>

  return`<div class="main">
    <div class="ph"><button class="pbk" onclick="go('home')">←</button><div class="ptit">${s.icon} ${s.name}</div></div>

      <div style="display:flex;justify-content:space-between;align-items:start;gap:8px;">

            <span style="font-weight:600;font-size:14px;font-family:'Syne',sans-serif;">${a.service.name}</span>
            <span class="badge ${a.status==='pending'?'bp':a.status==='confirmed'?'bc':'br'}">${a.status==='pending'?'Pendiente':a.status==='confirmed'?'Confirmada':'Rechazada'}</span>
          </div>
          <div style="font-size:12px;color:var(--text-2);margin-bottom:2px;">👤 ${a.pro?.name||'—'} · ${a.modality==='domicilio'?'🚗':'🏢'} ${a.modality==='domicilio'?'Domicilio':'Estudio'}</div>
          ${a.modality==='domicilio'&&a.address?`<div style="font-size:11px;color:var(--text-3);margin-bottom:2px;">📍 ${esc(a.address)}</div>`:''}
          ${a.modality==='estudio'&&a.pro?.modalities?.estudio?.address?`<div style="font-size:11px;color:var(--text-3);margin-bottom:2px;">📍 ${a.pro.modalities.estudio.address}</div>`:''}
          <div style="font-size:12px;color:var(--text-2);">${fmtD(a.date)} · ${a.time} · ${a.gender==='male'?'Hombre':'Mujer'} · <strong>${fp(a.price)}</strong></div>

// ── VIEW: PRO PANEL ───────────────────────────────────────────────────────────
function vPro(){
  const tabs=[
    {id:'dash',icon:'📊',label:'Dashboard'},
    {id:'citas',icon:'📅',label:'Citas'},
    {id:'servicios',icon:'💼',label:'Servicios'},
    {id:'agenda',icon:'🗓️',label:'Agenda'},
    {id:'config',icon:'⚙️',label:'Config'},
    {id:'billing',icon:'💳',label:'Boleta'}
  ];
  const tabBar=`<div style="display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:20px;overflow-x:auto;">
    ${tabs.map(t=>`<button onclick="S.proTab='${t.id}';render()" style="flex:1;min-width:fit-content;padding:8px 10px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all 0.15s;
      ${S.proTab===t.id?'background:var(--purple);color:white;':'background:transparent;color:var(--text-2);'}">${t.icon} ${t.label}</button>`).join('')}
  </div>`;
  let content='';
  if(S.proTab==='dash') content=proTabDash();
  else if(S.proTab==='citas') content=proTabCitas();
  else if(S.proTab==='servicios') content=proTabServicios();
  else if(S.proTab==='agenda') content=proTabAgenda();
  else if(S.proTab==='config') content=proTabConfig();
  else if(S.proTab==='billing') content=proTabBilling();
  return`<div class="main">
    <div class="ph"><button class="pbk" onclick="go('home')">←</button><div class="ptit">Panel profesional</div></div>
    ${tabBar}${content}</div>`;
}

// ── PRO TAB: DASHBOARD ────────────────────────────────────────────────────────
function proTabDash(){
  const pro=myPro();
  const all=S.appointments.filter(a=>a.pro?.id===pro.id);
  const pending=all.filter(a=>a.status==='pending');
  const confirmed=all.filter(a=>a.status==='confirmed');
  const earn=confirmed.reduce((s,a)=>s+a.price,0);
  const pendEarn=pending.reduce((s,a)=>s+a.price,0);
  const ownApts=all.filter(a=>a.isOwn);
  return`
  <div style="display:flex;gap:10px;margin-bottom:16px;">
    <div class="statbox"><div class="statnum" style="color:var(--amber)">${pending.length}</div><div class="statlbl">Por revisar</div></div>
    <div class="statbox"><div class="statnum" style="color:var(--teal)">${confirmed.length}</div><div class="statlbl">Confirmadas</div></div>
    <div class="statbox"><div class="statnum" style="color:var(--blue)">${ownApts.length}</div><div class="statlbl">Propias</div></div>
    <div class="statbox"><div class="statnum" style="color:var(--purple)">${fp(earn)}</div><div class="statlbl">Ingresos</div></div>
  </div>
  <div class="wallet">
    <div style="font-size:12px;opacity:0.8;margin-bottom:4px;">Billetera virtual</div>
    <div class="wamt">${fp(earn)}</div>
    <div style="display:flex;gap:10px;margin-bottom:14px;">
      <div class="wstat"><div class="wstatn">${fp(earn)}</div><div class="wstatl">Confirmado</div></div>
      <div class="wstat"><div class="wstatn">${fp(pendEarn)}</div><div class="wstatl">Pendiente</div></div>
      <div class="wstat"><div class="wstatn">${confirmed.length}</div><div class="wstatl">Citas</div></div>
    </div>
    ${(()=>{
      const pro=myPro();
      const myPending=S.withdrawals.filter(w=>w.proId===pro.id&&w.status==='pending');
      const myPaid=S.withdrawals.filter(w=>w.proId===pro.id&&w.status==='paid');
      const paidTotal=myPaid.reduce((s,w)=>s+w.amount,0);
      const available=earn-paidTotal-myPending.reduce((s,w)=>s+w.amount,0);
      return`<div style="display:flex;gap:10px;margin-bottom:14px;">
        <div class="wstat"><div class="wstatn">${fp(available)}</div><div class="wstatl">Disponible</div></div>
        <div class="wstat"><div class="wstatn">${fp(paidTotal)}</div><div class="wstatl">Retirado</div></div>
        <div class="wstat"><div class="wstatn">${myPending.length}</div><div class="wstatl">Sol. pendiente</div></div>
      </div>
      <div class="callout ct" style="margin-bottom:10px;"><span style="font-size:14px;flex-shrink:0;">ℹ️</span>
        <div>Los retiros se procesan <strong>1 vez por semana</strong> (viernes). El admin recibirá tu solicitud y liberará el pago.</div></div>
      ${myPending.length>0?`<div style="background:rgba(255,255,255,0.15);border-radius:8px;padding:10px;margin-bottom:10px;font-size:12px;">
        ⏳ Solicitud pendiente: <strong>${fp(myPending[0].amount)}</strong> — en proceso</div>`:''}
      ${available>0&&myPending.length===0?`<button class="wbtn" onclick="requestWithdrawal()">Solicitar retiro ${fp(available)}</button>`:`<button class="wbtn" style="opacity:0.5;cursor:not-allowed;">${available<=0?'Sin saldo disponible':'Solicitud en proceso'}</button>`}`;
    })()}
  </div>
  <div class="card">
    <div class="ctit">Próximas citas</div>
    ${pending.length===0?`<div style="color:var(--text-3);font-size:13px;text-align:center;padding:16px 0;">Sin solicitudes pendientes</div>`
    :pending.slice(0,3).map(a=>`<div class="aptitem pending" style="margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:start;gap:8px;">
        <div><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
          <span>${a.service.icon}</span><strong style="font-size:13px;">${a.service.name}</strong>
          <span class="badge bp">Pendiente</span></div>
          <div style="font-size:12px;color:var(--text-2);">${esc(a.name)} · ${a.date} ${a.time} · ${fp(a.price)} · ${a.modality==='domicilio'?'🚗':'🏢'}</div>
        </div>
        <div style="display:flex;gap:6px;flex-shrink:0;">
          <button class="bsm bsm-g" onclick="setStatus(${a.id},'confirmed')">✓ Aceptar</button>
          <button class="bsm bsm-r" onclick="setStatus(${a.id},'rejected')">✕</button>
        </div>
      </div></div>`).join('')}
    ${pending.length>3?`<button class="btn btn-o" style="margin-top:8px;" onclick="S.proTab='citas';render()">Ver todas (${pending.length})</button>`:''}
  </div>`;
}

      ${S.citasSubTab==='como-cliente'?'background:var(--surface);color:var(--purple);box-shadow:0 1px 4px rgba(123,94,167,0.15);':'background:transparent;color:var(--text-2);'}">

// ── REVIEWS ──────────────────────────────────────────────────────────────────
function canReview(apt){
  if(apt.status!=='confirmed') return false;
  // Only after the appointment date has passed
  const aptDate=new Date(apt.date+'T23:59:59');
  if(aptDate>=new Date()) return false;
  const uid=S.user?.id;
  return !S.reviews.find(r=>r.aptId===apt.id&&r.authorId===uid);
}
function getReview(aptId){
  return S.reviews.filter(r=>r.aptId===aptId);
}
function avgRating(proId){
  const rs=S.reviews.filter(r=>r.proId===proId&&r.status==='approved');
  if(!rs.length) return null;
  return (rs.reduce((s,r)=>s+r.stars,0)/rs.length).toFixed(1);
}
function submitReview(aptId){
  const apt=S.appointments.find(a=>a.id===aptId);
  if(!apt) return;
  const stars=S._reviewStars||0;
  const comment=document.getElementById('rv-comment-'+aptId)?.value.trim()||'';
  if(!stars){showToast('Selecciona una calificación','warn');return;}
  const isAdmin=S.user?.type==='admin';
  S.reviews.push({
    id:uid(), aptId, authorId:S.user.id, authorName:S.user.name,
    authorType:S.user.type, proId:apt.pro?.id, svcId:apt.service?.id,
    stars, comment, status:'pending', date:todayStr()
  });
  S._reviewStars=0; S._reviewingAptId=null;
  render();
}
function approveReview(id){S.reviews=S.reviews.map(r=>r.id===id?{...r,status:'approved'}:r);render();}
function rejectReview(id){S.reviews=S.reviews.map(r=>r.id===id?{...r,status:'rejected'}:r);render();}
function deleteReview(id){if(confirm('¿Eliminar reseña?')){S.reviews=S.reviews.filter(r=>r.id!==id);render();}}

function starPicker(aptId){
  const cur=S._reviewingAptId===aptId?(S._reviewStars||0):0;
  return`<div class="star-picker" id="sp-${aptId}">${[1,2,3,4,5].map(n=>`<span class="${n<=cur?'on':''}" onclick="S._reviewStars=${n};S._reviewingAptId=${aptId};render()"
    onmouseenter="document.querySelectorAll('#sp-${aptId} span').forEach((s,i)=>s.style.color=i<${n}?'#F59E0B':'#D1D5DB')"
    onmouseleave="document.querySelectorAll('#sp-${aptId} span').forEach((s,i)=>s.style.color='')">★</span>`).join('')}</div>`;
}

function reviewWidget(apt){
  if(!S.user) return '';
  const existing=S.reviews.find(r=>r.aptId===apt.id&&r.authorId===S.user.id);
  if(existing){
    return`<div style="margin-top:10px;padding:10px 12px;background:var(--bg);border-radius:8px;">
      <div style="font-size:11px;color:var(--text-3);margin-bottom:3px;">Tu reseña ${existing.status==='pending'?'<span style="color:var(--amber);">(pendiente de aprobación)</span>':existing.status==='approved'?'<span style="color:var(--green);">✓ Aprobada</span>':'<span style="color:var(--red);">✕ Rechazada</span>'}</div>
      <div class="review-stars">${'★'.repeat(existing.stars)}${'☆'.repeat(5-existing.stars)}</div>
      ${existing.comment?`<div style="font-size:12px;color:var(--text-2);margin-top:3px;">"${existing.comment}"</div>`:''}
    </div>`;
  }
  if(!canReview(apt)) return '';
  const isOpen=S._reviewingAptId===apt.id;
  return`<div style="margin-top:10px;">

}

          <span>${s.icon}</span><span style="flex:1;">${s.name}</span>
          <span style="color:var(--text-3);">${prosFor(s.id).length} pros</span>
          ${S.featuredSvcIds.includes(s.id)?`<span class="featured-badge">⭐</span>`:''}
        </div>`).join('')}
      </div>`:'';}).join('')}
  </div>`;
}

function toggleFeaturedSvc(id){
  if(S.featuredSvcIds.includes(id)) S.featuredSvcIds=S.featuredSvcIds.filter(x=>x!==id);
  else S.featuredSvcIds.push(id);
  render();
}
function toggleFeaturedPro(id){
  if(S.featuredProIds.includes(id)) S.featuredProIds=S.featuredProIds.filter(x=>x!==id);
  else S.featuredProIds.push(id);
  render();
}

// ── WITHDRAWAL ───────────────────────────────────────────────────────────────
function requestWithdrawal(){
  const pro=myPro();
  const confirmed=S.appointments.filter(a=>a.pro?.id===pro.id&&a.status==='confirmed');
  const earn=confirmed.reduce((s,a)=>s+a.price,0);
  const paid=S.withdrawals.filter(w=>w.proId===pro.id&&w.status==='paid').reduce((s,w)=>s+w.amount,0);
  const pending=S.withdrawals.filter(w=>w.proId===pro.id&&w.status==='pending').reduce((s,w)=>s+w.amount,0);
  const available=earn-paid-pending;
  if(available<=0){showToast('No tienes saldo disponible','err');return;}
  S.withdrawals.push({
    id:uid(), proId:pro.id, proName:pro.name,
    amount:available, status:'pending',
    requestDate:todayStr(), paidDate:null
  });
  showToast(`Solicitud enviada por ${fp(available)}. El admin procesará el pago el próximo viernes.`,'ok',4500);
  render();
}
function releaseWithdrawal(id){
  S.withdrawals=S.withdrawals.map(w=>w.id===id?{...w,status:'paid',paidDate:todayStr()}:w);
  render();
}
function rejectWithdrawal(id){
  if(confirm('¿Rechazar esta solicitud de retiro?'))
    S.withdrawals=S.withdrawals.map(w=>w.id===id?{...w,status:'rejected'}:w);
  render();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
// FIX 11: track last rendered state to avoid redundant topbar/drawer repaints
let _lastUser=null, _lastDrawer=false, _lastDrawerTab='';
function render(){
  const views={home:vHome,booking:vBooking,confirm:vConfirm,clientDash:vClientDash,pro:vPro,admin:vAdmin};
  const userChanged=S.user!==_lastUser;
  const drawerChanged=S.drawerOpen!==_lastDrawer||S.drawerTab!==_lastDrawerTab;
  if(userChanged||drawerChanged){
    renderTopbar();
    renderDrawer();
    _lastUser=S.user; _lastDrawer=S.drawerOpen; _lastDrawerTab=S.drawerTab;
  }
  document.getElementById('mc').innerHTML=(views[S.view]||vHome)();
}
render();
</script>

<div id="toast-container"></div>
<script>
// FIX 6: Toast system — replaces all native alert() calls
function showToast(msg, type='info', duration=3200){
  const tc=document.getElementById('toast-container');
  if(!tc) return;
  const icons={info:'💜',ok:'✓',warn:'⚠️',err:'✕'};
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`<span>${icons[type]||'ℹ️'}</span><span>${esc(msg)}</span>`;
  tc.appendChild(t);
  setTimeout(()=>{
    t.style.animation='toast-out 0.3s ease forwards';
    setTimeout(()=>t.remove(),300);
  },duration);
}
</script>
